<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CoachPro — Marianne</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── THEMES ── */
[data-theme="dark"]{
  --bg:#0a0a0f;--surf:#13131a;--surf2:#1c1c26;--surf3:#252535;
  --border:rgba(255,255,255,0.08);--text:#f0f0f8;--text2:#9090b0;--text3:#5a5a78;
  --shadow:rgba(0,0,0,0.4);--nav-bg:rgba(19,19,26,0.95);
}
[data-theme="light"]{
  --bg:#f2f2f7;--surf:#ffffff;--surf2:#f0f0f5;--surf3:#e5e5ea;
  --border:rgba(0,0,0,0.08);--text:#1a1a2e;--text2:#6b6b80;--text3:#9090a8;
  --shadow:rgba(0,0,0,0.12);--nav-bg:rgba(255,255,255,0.95);
}
:root{--accent:#6C63FF;--accent2:#FF6B9D;--accent3:#00D4AA;--r:20px;--r2:12px;--safe:env(safe-area-inset-bottom,16px);}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;transition:background .3s,color .3s;}

[data-theme="dark"] body::before{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(108,99,255,0.2) 0%,transparent 70%);pointer-events:none;z-index:0;}

.view{display:none;flex-direction:column;min-height:100vh;padding-bottom:calc(84px + var(--safe));animation:fi .25s ease;}
.view.on{display:flex;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:10;padding:52px 20px 16px;background:linear-gradient(to bottom,var(--bg) 60%,transparent);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
h1{font-size:26px;font-weight:900;letter-spacing:-0.5px;}
h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{font-size:13px;color:var(--text2);margin-top:2px;}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),#FF8C42);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0;}

/* ── THEME TOGGLE ── */
.theme-btn{background:var(--surf2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:16px;color:var(--text2);transition:all .2s;display:flex;align-items:center;gap:6px;}
.theme-btn:active{opacity:.7;}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;align-items:center;justify-content:space-around;padding:10px 8px calc(var(--safe) + 8px);background:var(--nav-bg);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:100;}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;border-radius:14px;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;transition:color .2s;}
.nb svg{width:22px;height:22px;}
.nb.on{color:var(--accent);}
.nb.on svg{transform:translateY(-1px);}
.nd{width:4px;height:4px;border-radius:50%;background:transparent;transition:background .2s;}
.nb.on .nd{background:var(--accent);}

/* ── CALENDAR ── */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin:0 16px 12px;}
.cal-m{font-size:20px;font-weight:800;}
.cal-nb{background:var(--surf2);border:none;color:var(--text);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 16px;}
.cal-dl{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:6px 0;text-transform:uppercase;}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;position:relative;border:none;background:transparent;color:var(--text2);transition:all .15s;}
.cd.oth{color:var(--text3);}
.cd.tod{background:var(--surf2);color:var(--text);border:1.5px solid var(--accent);}
.cd.sel{background:var(--accent);color:#fff;}
.cd.has::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent2);}
.cd.sel::after{background:rgba(255,255,255,0.8);}
.sec{padding:12px 16px 6px;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}

/* ── SESSION CARD ── */
.sl{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.sc{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;position:relative;overflow:hidden;transition:background .3s;}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--accent));}
.sc-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px;}
.sc-date{font-size:12px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.sc-time{font-size:12px;color:var(--accent);font-weight:800;background:rgba(108,99,255,0.12);padding:3px 10px;border-radius:20px;flex-shrink:0;}
.sc-act{display:flex;align-items:center;gap:6px;margin:4px 0;}
.sc-act-lbl{font-size:15px;font-weight:800;}
.sc-prev{font-size:12px;color:var(--text2);line-height:1.4;margin-top:6px;overflow:hidden;max-height:36px;}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:4px;}
.stat{background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:14px;transition:background .3s;}
.sv{font-size:28px;font-weight:900;}
.sl2{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

/* ── FILTER PILLS ── */
.fp-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px;scrollbar-width:none;margin-bottom:8px;}
.fp-row::-webkit-scrollbar{display:none;}
.fp{flex-shrink:0;padding:7px 14px;border-radius:30px;border:1.5px solid var(--border);background:var(--surf);font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);white-space:nowrap;font-family:'Nunito',sans-serif;transition:all .2s;}
.fp.on{border-color:var(--accent);background:rgba(108,99,255,0.12);color:var(--accent);}
.fp.day.on{border-color:var(--accent2);background:rgba(255,107,157,0.12);color:var(--accent2);}
.day-group{margin-bottom:14px;}
.day-group-title{font-size:13px;font-weight:800;color:var(--text2);margin:0 16px 8px;padding-left:10px;border-left:3px solid var(--accent2);}
.day-group-cards{padding:0 16px;display:flex;flex-direction:column;gap:10px;}

/* ── DICO ── */
.df{display:flex;gap:8px;overflow-x:auto;padding:0 16px;scrollbar-width:none;margin-bottom:14px;}
.df::-webkit-scrollbar{display:none;}
.dp{flex-shrink:0;padding:7px 14px;border-radius:30px;border:1.5px solid var(--border);background:var(--surf);font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);white-space:nowrap;font-family:'Nunito',sans-serif;}
.dp.on{border-color:var(--accent3);background:rgba(0,212,170,0.12);color:var(--accent3);}
.dl2{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.di{background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;transition:background .3s;}
.di-l{flex:1;}
.di-n{font-size:15px;font-weight:800;margin-bottom:3px;}
.di-d{font-size:12px;color:var(--text2);line-height:1.4;}
.di-t{font-size:11px;color:var(--accent3);font-weight:700;margin-top:5px;display:inline-block;background:rgba(0,212,170,0.1);padding:2px 8px;border-radius:10px;}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mo.on{display:flex;}
.mb{background:var(--surf);border-radius:28px 28px 0 0;width:100%;max-width:430px;padding:20px 20px calc(var(--safe) + 24px);max-height:90vh;overflow-y:auto;animation:su .3s cubic-bezier(.34,1.56,.64,1);transition:background .3s;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.mt{font-size:20px;font-weight:900;margin-bottom:18px;}
.lbl{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block;}
.inp{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;padding:12px 14px;outline:none;transition:border-color .2s,background .3s;margin-bottom:14px;}
.inp:focus{border-color:rgba(108,99,255,0.5);}
.inp::placeholder{color:var(--text3);}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.tag{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border);cursor:pointer;color:var(--text2);background:transparent;font-family:'Nunito',sans-serif;transition:all .15s;}
.tag.on{border-color:var(--accent);background:rgba(108,99,255,0.15);color:var(--accent);}

/* ── TIME PICKER ── */
.time-row{display:flex;gap:10px;margin-bottom:16px;}
.time-sel{flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;padding:12px 14px;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;text-align:center;transition:background .3s;}
.time-sel option{background:var(--surf2);color:var(--text);}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;margin-top:14px;}
.btn-p{flex:1;padding:16px;border-radius:var(--r2);border:none;background:linear-gradient(135deg,var(--accent),#8B5CF6);color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.btn-p:disabled{opacity:.5;}
.btn-s{padding:14px 20px;border-radius:var(--r2);border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-d{padding:8px 14px;border-radius:8px;border:none;background:rgba(255,59,48,0.15);color:#FF3B30;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-edit{padding:8px 14px;border-radius:8px;border:none;background:rgba(108,99,255,0.15);color:var(--accent);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(84px + var(--safe));right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8B5CF6);border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(108,99,255,0.4);z-index:50;}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 30px;}
.empty .emo{font-size:44px;margin-bottom:12px;}
.empty h3{font-size:17px;font-weight:800;margin-bottom:6px;}
.empty p{font-size:13px;color:var(--text2);}

/* ── TOAST ── */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surf3);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;}
.toast.on{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--accent3);color:var(--accent3);}
.toast.err{border-color:#FF3B30;color:#FF3B30;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
#loader .emo{font-size:52px;}
#loader h2{font-size:18px;font-weight:800;}
#loader p{font-size:13px;color:var(--text2);}
#err-box{background:var(--surf);border:1px solid #FF3B30;border-radius:12px;padding:16px;font-size:12px;color:#FF3B30;word-break:break-all;width:90%;line-height:1.6;}

/* ── RICH TEXT EDITOR ── */
.editor-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;}
.editor-toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;background:var(--surf2);border-bottom:1px solid var(--border);transition:background .3s;}
.tb-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;transition:all .15s;flex-shrink:0;}
.tb-btn:active{background:rgba(108,99,255,0.2);color:var(--accent);}
.tb-sep{width:1px;background:var(--border);margin:4px 2px;align-self:stretch;}
.tb-color{width:28px;height:28px;border-radius:6px;border:2px solid var(--border);cursor:pointer;padding:0;background:transparent;flex-shrink:0;overflow:hidden;position:relative;}
.tb-color input[type=color]{position:absolute;inset:0;width:140%;height:140%;top:-20%;left:-20%;opacity:0;cursor:pointer;}
.tb-color-dot{width:100%;height:100%;border-radius:4px;background:#f0f0f8;}
.editor-body{
  background:var(--surf2);color:var(--text);
  font-family:'Nunito',sans-serif;font-size:18px;line-height:1.8;
  padding:14px;min-height:160px;outline:none;word-break:break-word;
  white-space:pre-wrap;
  transition:background .3s;
}
.editor-body:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none;font-size:18px;}
.editor-body h2{font-size:22px;font-weight:900;margin:4px 0;white-space:normal;}
.editor-body ul{padding-left:22px;white-space:normal;}
.editor-body ul li{margin:3px 0;}
.editor-body ol{padding-left:22px;white-space:normal;}
.editor-body ol li{margin:3px 0;padding-left:4px;}
/* Affichage du contenu riche dans le détail */
.rich-content{font-size:18px;line-height:1.8;background:var(--surf2);border-radius:12px;padding:14px;white-space:pre-wrap;transition:background .3s;}
.rich-content h2{font-size:21px;font-weight:900;margin:4px 0 6px;white-space:normal;}
.rich-content ul{padding-left:22px;white-space:normal;}
.rich-content ul li{margin:3px 0;}
.rich-content ol{padding-left:22px;white-space:normal;}
.rich-content ol li{margin:3px 0;padding-left:4px;}
</style>
</head>
<body>

<div id="loader"><div class="emo">🏊</div><h2>CoachPro</h2><p>Connexion en cours…</p></div>
<div class="toast" id="toast"></div>

<!-- ══ AGENDA ══ -->
<div class="view" id="v-cal">
  <div class="hdr">
    <div class="hdr-row">
      <div><h1>Coach<span>Pro</span></h1><div class="sub" id="today-lbl"></div></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
        <div class="avatar">MA</div>
      </div>
    </div>
  </div>
  <div class="cal-hdr">
    <span class="cal-m" id="cal-m-lbl"></span>
    <div style="display:flex;gap:8px">
      <button class="cal-nb" onclick="chM(-1)">‹</button>
      <button class="cal-nb" onclick="chM(1)">›</button>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="sec">Sessions du <span id="sel-lbl"></span></div>
  <div class="sl" id="sl-cal"></div>
  <button class="fab" onclick="openNew()">+</button>
</div>

<!-- ══ SESSIONS ══ -->
<div class="view" id="v-sess">
  <div class="hdr"><h1>Mes <span>Sessions</span></h1></div>
  <div class="sg">
    <div class="stat"><div class="sv" id="st-total">0</div><div class="sl2">Sessions totales</div></div>
    <div class="stat"><div class="sv" id="st-this">0</div><div class="sl2">Ce mois-ci</div></div>
  </div>
  <div class="sec" style="padding-bottom:6px">Mois</div>
  <div class="fp-row" id="fp-months"></div>
  <div class="fp-row" id="fp-days"></div>
  <div id="sess-list-wrap" style="padding-bottom:8px"></div>
</div>

<!-- ══ DICO ══ -->
<div class="view" id="v-dico">
  <div class="hdr">
    <div class="hdr-row">
      <div><h1>Dico <span>Mémo</span></h1><div class="sub">Bibliothèque d'exercices</div></div>
      <button class="btn-s" onclick="openDicoForm()" style="padding:10px 14px;font-size:12px;">+ Ajouter</button>
    </div>
  </div>
  <div class="df" id="dico-filters"></div>
  <div class="dl2" id="dico-list"></div>
</div>

<!-- ══ NAV ══ -->
<nav class="nav" id="main-nav" style="display:none">
  <button class="nb on" onclick="sw('cal',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Agenda<div class="nd"></div>
  </button>
  <button class="nb" onclick="sw('sess',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Sessions<div class="nd"></div>
  </button>
  <button class="nb" onclick="sw('dico',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><path d="M8 10h8M8 14h5"/></svg>
    Dico<div class="nd"></div>
  </button>
</nav>

<!-- ══ MODAL NOUVELLE / MODIFIER SESSION ══ -->
<div class="mo" id="m-new">
  <div class="mb">
    <div class="mh"></div>
    <div class="mt" id="m-new-title">Nouvelle séance</div>

    <span class="lbl">Activité</span>
    <div class="tag-row" id="m-acts"></div>

    <span class="lbl">Heure du cours</span>
    <div class="time-row">
      <select class="time-sel" id="m-heure"></select>
      <select class="time-sel" id="m-min" style="max-width:110px"></select>
    </div>

    <span class="lbl">Contenu de la séance</span>
    <div class="editor-wrap">
      <div class="editor-toolbar">
        <button class="tb-btn" title="Gras" onmousedown="fmt(event,'bold')"><b>B</b></button>
        <button class="tb-btn" title="Italique" onmousedown="fmt(event,'italic')"><i style="font-style:italic">I</i></button>
        <button class="tb-btn" title="Souligné" onmousedown="fmt(event,'underline')"><u>S</u></button>
        <button class="tb-btn" title="Titre" onmousedown="fmtTitle(event)" style="font-size:13px;font-weight:900">T</button>
        <button class="tb-btn" title="Liste à puces" onmousedown="fmt(event,'insertUnorderedList')">☰</button>
        <button class="tb-btn" title="Liste numérotée" onmousedown="fmt(event,'insertOrderedList')" style="font-size:12px;font-weight:900">1.</button>
        <div class="tb-sep"></div>
        <div class="tb-color" title="Couleur personnalisée">
          <div class="tb-color-dot" id="color-dot"></div>
          <input type="color" id="color-picker" value="#f0f0f8" oninput="applyColor(this.value)">
        </div>
        <button class="tb-btn" style="width:22px;height:22px;border-radius:50%;background:#FF4D4D;margin:5px 1px;" onmousedown="fmtColor(event,'#FF4D4D')" title="Rouge"></button>
        <button class="tb-btn" style="width:22px;height:22px;border-radius:50%;background:#FF8C42;margin:5px 1px;" onmousedown="fmtColor(event,'#FF8C42')" title="Orange"></button>

// Auto-détection 1. 2. 3. → liste numérotée
function setupAutoList(editorId) {
  const el = document.getElementById(editorId);
  el.addEventListener('keydown', function(e) {
    if (e.key !== ' ') return;
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const node = range.startContainer;
    if (node.nodeType !== Node.TEXT_NODE) return;
    const text = node.textContent.slice(0, range.startOffset);
    // Détecte "1." "2." "12." etc en début de ligne
    if (/^\d+\.$/.test(text.trim())) {
      e.preventDefault();
      // Supprimer le texte "1." écrit
      const delRange = range.cloneRange();
      delRange.setStart(node, node.textContent.lastIndexOf(text.trim()));
      delRange.setEnd(node, range.startOffset);
      delRange.deleteContents();
      // Insérer liste ordonnée
      document.execCommand('insertOrderedList', false, null);
    }
  });
}

function chM(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCal();}
function renderCal(){

  let h=days.map(d=>`<div class="cal-dl">${d}</div>`).join('');
  let st=new Date(calY,calM,1).getDay();st=st===0?6:st-1;
  const dim=new Date(calY,calM+1,0).getDate();
  const prev=new Date(calY,calM,0).getDate();
  const td=today();
  for(let i=0;i<st;i++) h+=`<button class="cd oth">${prev-st+1+i}</button>`;
  for(let d=1;d<=dim;d++){
    const s=`${calY}-${p2(calM+1)}-${p2(d)}`;
    const has=sessions.some(x=>x.date===s);
    h+=`<button class="cd${s===td?' tod':''}${s===selDate?' sel':''}${has?' has':''}" onclick="selD('${s}')">${d}</button>`;
  }
  const rem=(7-(st+dim)%7)%7;
  for(let d=1;d<=rem;d++) h+=`<button class="cd oth">${d}</button>`;

// ══ SESSIONS + FILTRES ══
function renderAll(){
  document.getElementById('st-total').textContent=sessions.length;
  const thisMonth=today().slice(0,7);
  document.getElementById('st-this').textContent=sessions.filter(s=>s.date.startsWith(thisMonth)).length;

  const monthsAvail=[...new Set(sessions.map(s=>s.date.slice(0,7)))].sort().reverse();
  if(!filtMonth&&monthsAvail.length) filtMonth=monthsAvail[0];

  document.getElementById('fp-months').innerHTML=monthsAvail.length
    ? monthsAvail.map(ym=>{const[y,m]=ym.split('-');return `<button class="fp${filtMonth===ym?' on':''}" onclick="setFiltMonth('${ym}')">${MF[+m-1]} ${y}</button>`;}).join('')
    : '<span style="font-size:13px;color:var(--text3);padding:4px 0">Aucune session</span>';

  const inMonth=sessions.filter(s=>s.date.startsWith(filtMonth||'xxxx'));
  const dowsAvail=[...new Set(inMonth.map(s=>dowOf(s.date)))].sort();
  document.getElementById('fp-days').innerHTML=dowsAvail.length
    ? `<button class="fp day${filtDay===null?' on':''}" onclick="setFiltDay(null)">Tous</button>`+
      dowsAvail.map(dow=>`<button class="fp day${filtDay===dow?' on':''}" onclick="setFiltDay(${dow})">${DF[dow]}</button>`).join('')
    : '';

  let list=inMonth;
  if(filtDay!==null) list=list.filter(s=>dowOf(s.date)===filtDay);
  list=[...list].sort((a,b)=>{const dc=b.date.localeCompare(a.date);return dc!==0?dc:(a.heure||'').localeCompare(b.heure||'');});

  const wrap=document.getElementById('sess-list-wrap');
  if(!list.length){wrap.innerHTML=`<div class="empty"><div class="emo">🏅</div><h3>Aucune session</h3><p>Pas de séance pour ce filtre.</p></div>`;return;}
  const byDate={};
  list.forEach(s=>{(byDate[s.date]=byDate[s.date]||[]).push(s);});
  wrap.innerHTML=Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).map(date=>`
    <div class="day-group">
      <div class="day-group-title">${fmtF(date)}</div>
      <div class="day-group-cards">${byDate[date].map(s=>sCard(s)).join('')}</div>
    </div>`).join('');
}

async function saveSession(){
  if(!mAct){toast('Choisis une activité !','err');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='⏳…';
  try{
    const html=document.getElementById('editor').innerHTML;
    const heure=getTime();

    if(editingId){
      // MODIFICATION
      await db('PATCH','sessions',`id=eq.${editingId}`,{activity:mAct,heure,text:html});
      const idx=sessions.findIndex(s=>s.id===editingId);
      if(idx>=0) sessions[idx]={...sessions[idx],activity:mAct,heure,text:html};
      toast('✅ Session mise à jour !');
    } else {
      // NOUVELLE
      const row={id:uid(),coach_id:COACH,date:selDate,heure,activity:mAct,text:html};
      await db('POST','sessions','',row);
      sessions.unshift(row);
      toast('✅ Session enregistrée !');
    }
    closeM('m-new');renderCal();renderCalList();renderAll();
  }catch(e){toast('Erreur : '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent=editingId?'Mettre à jour':'Enregistrer';}
}

}

  document.getElementById('dico-modal-title').textContent='Modifier l\'exercice';
  document.getElementById('btn-save-dico').textContent='Mettre à jour';
  renderActTags('d-acts',dAct,id=>{dAct=id;renderActTags('d-acts',dAct,arguments.callee);});
  openM('m-dico');
}

async function saveDico(){
  const name=document.getElementById('d-name').value.trim();
  if(!name){toast('Donne un nom !','err');return;}
  if(!dAct){toast('Choisis une activité !','err');return;}
  const html=document.getElementById('d-editor').innerHTML;
  try{
    if(editingDicoId){
      await db('PATCH','dico',`id=eq.${editingDicoId}`,{name,activity:dAct,description:html});
      const idx=dico.findIndex(d=>d.id===editingDicoId);
      if(idx>=0) dico[idx]={...dico[idx],name,activity:dAct,description:html};
      toast('✅ Exercice modifié !');
    } else {
      const row={id:uid(),coach_id:COACH,name,activity:dAct,description:html};
      await db('POST','dico','',row);
      dico.push(row);
      toast('✅ Exercice ajouté !');
    }
    closeM('m-dico');renderDico();
  }catch(e){toast('Erreur : '+e.message,'err');}
}

async function delDico(id){
  if(!confirm('Supprimer ?'))return;
  try{
    await db('DELETE','dico',`id=eq.${id}`);
    dico=dico.filter(d=>d.id!==id);renderDico();
    toast('Supprimé');
  }catch(e){toast('Erreur','err');}
}

// ══ MODALS ══
function openM(id){document.getElementById(id).classList.add('on');}
function closeM(id){document.getElementById(id).classList.remove('on');}
document.querySelectorAll('.mo').forEach(el=>el.addEventListener('click',ev=>{if(ev.target===el)el.classList.remove('on');}));

// ══ INIT ══
(async()=>{
  const loader=document.getElementById('loader');
  try{
    const[s,d]=await Promise.all([
      db('GET','sessions',`coach_id=eq.${COACH}&order=date.desc,heure.asc`),
      db('GET','dico',`coach_id=eq.${COACH}&order=name.asc`)
    ]);
    sessions=s;dico=d;
    loader.style.display='none';
    document.getElementById('main-nav').style.display='flex';
    document.getElementById('v-cal').classList.add('on');
    document.getElementById('today-lbl').textContent=fmtF(today());
    document.getElementById('sel-lbl').textContent=fmtF(selDate);
    // Init theme btn
    const theme=localStorage.getItem('cp_theme')||'dark';
    document.getElementById('theme-btn').textContent=theme==='dark'?'☀️':'🌙';
    renderCal();renderCalList();
    // Init auto-liste numérotée
    setupAutoList('editor');
    setupAutoList('d-editor');
  }catch(e){
    loader.innerHTML=`<div class="emo">⚠️</div><h2>Erreur de connexion</h2><div id="err-box">${e.message}</div><button class="btn-p" onclick="location.reload()" style="margin-top:12px;max-width:200px;padding:14px">Réessayer</button>`;
  }
})();
</script>
